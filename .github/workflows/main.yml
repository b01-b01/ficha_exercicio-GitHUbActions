name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  check-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check Commit Message
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -iqE "^(FEAT:|FIX:)"; then
            echo "Success"
          else
            echo "Error: Commit message must start with FEAT: or FIX:"
            exit 1
          fi

  build-and-publish:
    needs: check-commit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Nome alterado para minúsculas manualmente para evitar o erro do Docker
          tags: ghcr.io/${{ github.actor }}/hello-world-app:latest
